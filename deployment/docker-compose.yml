name: civichero

services:
  mysql:
    image: mysql:8.0
    container_name: civichero-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CivicHeroDB
      MYSQL_USER: civichero
      MYSQL_PASSWORD: civichero

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - civichero-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: civichero-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - civichero-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: civichero-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    networks:
      - civichero-network

  mailhog:
    image: mailhog/mailhog
    container_name: civichero-mailhog
    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - civichero-network

networks:
  civichero-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
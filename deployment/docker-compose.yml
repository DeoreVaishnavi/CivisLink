name: civichero

services:

  mysql:
    image: mysql:8.0
    container_name: civichero-mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: CivicHeroDB
      MYSQL_USER: civichero
      MYSQL_PASSWORD: civichero

    ports:
      - "3307:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - civichero-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: civichero-redis
    restart: unless-stopped

    ports:
      - "6379:6379"

    volumes:
      - redis_data:/data

    networks:
      - civichero-network

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    container_name: civichero-rabbitmq
    restart: unless-stopped

    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

    ports:
      - "5672:5672"
      - "15672:15672"

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

    networks:
      - civichero-network

    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 10

  mailhog:
    image: mailhog/mailhog
    container_name: civichero-mailhog
    restart: unless-stopped

    ports:
      - "1025:1025"
      - "8025:8025"

    networks:
      - civichero-network

  backend:
    build:
      context: ..
      dockerfile: deployment/backend/Dockerfile

    container_name: civichero-backend

    restart: unless-stopped

    depends_on:
      mysql:
        condition: service_healthy

    environment:
      ASPNETCORE_ENVIRONMENT: Development

      ConnectionStrings__DefaultConnection: >
        Server=mysql;
        Port=3306;
        Database=CivicHeroDB;
        User=civichero;
        Password=civichero;

    ports:
      - "8080:8080"

    networks:
      - civichero-network

  frontend:
    build:
      context: ..
      dockerfile: deployment/frontend/Dockerfile

    container_name: civichero-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_started

    ports:
      - "3000:80"

    networks:
      - civichero-network

networks:
  civichero-network:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data: